name: SCA (Paso 4)

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: fluidattacks/sca-action@1.2.0
        id: scan
        with:
          scan_config_path: .github/paso4/sca-config.yaml

      - name: Subir CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paso4-sca-results
          path: results-sca.csv
          if-no-files-found: ignore

      - name: Fallar si supera umbral de severidad
        if: steps.scan.outputs.vulnerabilities_found == 'true'
        run: exit 1
