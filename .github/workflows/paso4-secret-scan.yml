name: Secret Scan (Paso 4)

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fluidattacks/ss-action@0.2.0
        id: scan
        with:
          scan_config_path: .github/paso4/ss-config.yaml
          scanner_mode: full

      - name: Subir CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paso4-ss-results
          path: results-ss.csv
          if-no-files-found: ignore

      - name: Fallar si hay secretos
        if: steps.scan.outputs.vulnerabilities_found == 'true'
        run: exit 1
