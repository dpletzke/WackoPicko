name: SAST (Paso 2)

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fluidattacks/sast-action@1.3.0
        with:
          scan_config_path: .github/paso2/sast-config.yaml
          scanner_mode: full
