name: Secret Scan (Paso 2)

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fluidattacks/ss-action@0.2.0
        with:
          scan_config_path: .github/paso2/ss-config.yaml
          scanner_mode: full
